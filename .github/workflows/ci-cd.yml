name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # 1. TEST — har qanday push da ishlaydi
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Python 3.11 o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Dependencylarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linting (flake8)
        run: |
          pip install flake8
          flake8 app/ --max-line-length=100 --ignore=E501,W503

      - name: Testlarni ishga tushirish
        run: |
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # 2. DEPLOY — faqat main ga push da
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test  # Test o'tmasa, deploy bo'lmaydi!
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: Vercel CLI o'rnatish
        run: npm install -g vercel@latest

      - name: Vercel ga deploy qilish (Production)
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────
  # 3. NOTIFY — deploy natijasi
  # ─────────────────────────────────────────
  notify:
    name: 📢 Natija
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
      - name: Muvaffaqiyatli deploy
        if: needs.deploy.result == 'success'
        run: echo "✅ Deploy muvaffaqiyatli! Production live."

      - name: Deploy xatosi
        if: needs.deploy.result == 'failure'
        run: echo "❌ Deploy xato! Loglarni tekshiring." && exit 1
